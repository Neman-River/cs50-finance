{% extends "layout.html" %}

{% block title %}
   Sell
{% endblock %}

{% block main %}
    <form action="/sell" method="post" class="w-25 mx-auto">
        <div class="mb-3">
            <select class="form-select" name="symbol" autofocus>
                <option selected value="">-- Choose Stock --</option>
                {% for stock in stocks %}
                    <option value="{{ stock }}">
                        {{ stock.upper() }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <input
                class="form-control"
                autocomplete="off"
                name="shares"
                placeholder="How much?"
                type="text">
        </div>

        <button class="btn btn-primary" type="submit">
            Sell Shares
        </button>
</form>

{% endblock %}
