{% extends "layout.html" %}

{% block title %}
Buy
{% endblock %}

{% block main %}
<form action="/buy" method="post" class="w-25 mx-auto">
    <div class="mb-3">
        <input class="form-control" autocomplete="off" autofocus name="symbol" placeholder="Choose Stock" type="text">
    </div>

    <div class="mb-3">
        <input class="form-control" autocomplete="off" name="shares" placeholder="How much?" type="text">
    </div>
    <button class="btn btn-primary" type="submit">
        Buy Shares
    </button>
</form>
{% endblock %}
